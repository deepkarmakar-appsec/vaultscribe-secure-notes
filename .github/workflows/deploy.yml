name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222

          script: |
            cd /opt/vaultscribe/vaultscribe-secure-notes

            # Force sync latest code
            git fetch origin
            git reset --hard origin/main

            # Install dependencies inside container
            docker exec vaultscribe composer install --no-interaction --prefer-dist --no-dev

            # Laravel commands inside container
            docker exec vaultscribe php artisan migrate --force

            docker exec vaultscribe php artisan config:cache

            docker exec vaultscribe php artisan route:cache